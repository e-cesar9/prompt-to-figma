<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Simple</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .test {
      padding: 20px;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="root">
    <h1>TEST SIMPLE (sans React)</h1>
    <div class="test">✅ HTML chargé</div>
    <div class="test" id="css-test">❌ CSS non chargé</div>
    <div class="test" id="js-test">❌ JS non chargé</div>
  </div>

  <script>
    console.log('🔥 Script inline exécuté!');
    
    // Test 1: JS fonctionne
    document.getElementById('js-test').textContent = '✅ JS chargé et exécuté!';
    document.getElementById('js-test').style.background = '#4CAF50';
    
    // Test 2: CSS fonctionne
    const cssTest = document.getElementById('css-test');
    const computedStyle = window.getComputedStyle(cssTest);
    if (computedStyle.padding === '20px') {
      cssTest.textContent = '✅ CSS chargé';
    }
    
    console.log('✅ Tous les tests passés!');
    console.log('Root element:', document.getElementById('root'));
  </script>
</body>
</html>
